name: Stale or incorrect card data
about: A card, relic, or mechanic no longer matches the current StS2 EA version
title: "[DATA] "
labels: data
body:
  - type: input
    id: card_name
    attributes:
      label: Card or relic name
    validations:
      required: true
  - type: input
    id: patch
    attributes:
      label: StS2 patch version (if known)
      placeholder: e.g. 0.4.2
  - type: textarea
    id: current
    attributes:
      label: What Spirelink currently shows
    validations:
      required: true
  - type: textarea
    id: correct
    attributes:
      label: What it should say
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Source
      placeholder: e.g. sts2.untapped.gg, in-game screenshot, patch notes
